<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Exercicio-02/style.css" />
    <title>Loja</title>
  </head>

  <body>
    <div class="header">
      <h1>Bem-vindo à nossa loja!</h1>
      <p>Confira nossos produtos incríveis:</p>
    </div>
    <section class="loja">
      <ul class="produtos">
        <li class="itens">
          <img src="assets/monitor.jpg" alt="Monitor" class="produto-imagem" />
          <h2>Monitor</h2>
          <p>Monitor de 24 polegadas com resolução 1920x1080.</p>
          <span>R$ 500,00</span>
          <button>Comprar</button>
        </li>
        <li class="itens">
          <img src="assets/teclado.jpg" alt="Teclado" class="produto-imagem" />
          <h2>Teclado</h2>
          <p>Teclado mecânico com switches azuis.</p>
          <span>R$ 75,00</span>
          <button>Comprar</button>
        </li>
        <li class="itens">
          <img src="assets/mouse.jpg" alt="Mouse" class="produto-imagem" />
          <h2>Mouse</h2>
          <p>Mouse óptico com DPI ajustável.</p>
          <span>R$ 100,00</span>
          <button>Comprar</button>
        </li>
      </ul>
    </section>
  </body>
</html>
